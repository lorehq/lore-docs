site_name: Lore
site_url: https://lorehq.github.io/lore-docs/
site_description: Coding agent harness
repo_url: https://github.com/lorehq/lore
repo_name: lorehq/lore

theme:
  name: material
  logo: assets/logo.svg
  palette:
    - scheme: slate
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - toc.follow
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/theme.css

plugins:
  - search
  - panzoom:
      key: none
      hint_location: disabled
      always_show_hint: true
      initial_zoom_level: 1.0
      full_screen: true
      include_selectors:
        - img
        - .mermaid
        - .d2

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - About:
    - How It Works: how-it-works.md
    - How Delegation Works: how-delegation-works.md
    - When to Use Lore: when-to-use-lore.md
    - Production Readiness: production-readiness.md
    - Cost Evidence:
      - Overview: cost-evidence/index.md
      - Analysis: cost-evidence/analysis.md
      - Methodology: cost-evidence/methodology.md
      - Raw Session Data: cost-evidence/raw-data.md
      - Operator Inputs: cost-evidence/operator-inputs.md
  - Guides:
    - First Session Setup:
      - Overview: guides/first-session/index.md
      - Knowledge Worker: guides/first-session/knowledge-worker.md
      - Homelab: guides/first-session/homelab.md
      - Personal: guides/first-session/personal.md
    - Working with Lore: guides/interaction.md
    - Working Across Repos: guides/cross-repo-workflow.md
    - Configuration: guides/configuration.md
    - Docs UI & Search: guides/docs-ui.md
    - Platform Support:
      - Overview: guides/platforms/index.md
      - Claude Code: guides/platforms/claude-code.md
      - Cursor: guides/platforms/cursor.md
      - OpenCode: guides/platforms/opencode.md
    - Hook Architecture: guides/hook-architecture.md
    - Conventions: guides/conventions.md
    - Roadmaps, Plans, Notes & Brainstorms: guides/roadmaps-and-plans.md
    - Examples:
      - Skill: examples/skill.md
      - Roadmap: examples/roadmap.md
      - Plan: examples/plan.md
      - Note: examples/note.md
      - Brainstorm: examples/brainstorm.md
  - Troubleshooting: troubleshooting.md
  - Changelog:
    - Current: changelog.md
    - Archive: changelog-archive.md
