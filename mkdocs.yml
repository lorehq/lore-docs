site_name: Lore
site_url: https://lorehq.github.io/lore-docs/
site_description: Coding agent harness
repo_url: https://github.com/lorehq/lore
repo_name: lorehq/lore

theme:
  name: material
  logo: assets/logo.svg
  palette:
    - scheme: slate
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - navigation.instant
    - toc.follow
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/theme.css

plugins:
  - search
  - panzoom:
      key: alt
      hint_location: top
      full_screen: true
      include_selectors:
        - img
        - .mermaid
        - .d2

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - First Session:
      - getting-started/first-session/index.md
      - Knowledge Worker: getting-started/first-session/knowledge-worker.md
      - Homelab: getting-started/first-session/homelab.md
    - Migration & Uninstalling: getting-started/migration.md
  - Guides:
    - guides/index.md
    - Working with Lore: guides/working-with-lore.md
    - Working Across Repos: guides/working-across-repos.md
    - Rules: guides/rules.md
    - Docs UI & Search: guides/docs-ui.md
    - Roadmaps & Plans: guides/roadmaps-and-plans.md
    - Upgrading: guides/upgrading.md
    - Field Repair: guides/field-repair.md
  - Concepts:
    - concepts/index.md
    - How It Works: concepts/how-it-works.md
    - Delegation: concepts/delegation.md
    - Hook Architecture: concepts/hook-architecture.md
    - Security: concepts/security.md
    - When to Use Lore: concepts/when-to-use-lore.md
    - Production Readiness: concepts/production-readiness.md
  - Reference:
    - reference/index.md
    - Commands: reference/commands.md
    - Configuration: reference/configuration.md
    - Platforms:
      - reference/platforms/index.md
      - Claude Code: reference/platforms/claude-code.md
      - Gemini CLI: reference/platforms/gemini-cli.md
      - Cursor: reference/platforms/cursor.md
      - OpenCode: reference/platforms/opencode.md
    - Troubleshooting: reference/troubleshooting.md
    - CI & Testing: reference/ci-and-testing.md
  - Evidence:
    - evidence/index.md
    - Analysis: evidence/analysis.md
    - Methodology: evidence/methodology.md
    - Raw Session Data: evidence/raw-data.md
    - Operator Inputs: evidence/operator-inputs.md
  - Changelog:
    - changelog.md
    - Archive: changelog-archive.md
